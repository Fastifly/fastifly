<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fastifly Offline</title>
    <style>
      :root {
        color-scheme: dark light;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        font-family:
          "Geist Variable",
          "Segoe UI",
          sans-serif;
        background: radial-gradient(circle at top, #14532d 0%, #052e16 50%, #022c22 100%);
        color: #ecfdf5;
      }
      main {
        width: min(34rem, calc(100% - 2rem));
        border-radius: 16px;
        padding: 1.25rem;
        background: rgba(4, 47, 46, 0.72);
        border: 1px solid rgba(16, 185, 129, 0.45);
      }
      h1 {
        margin: 0;
        font-size: 1.25rem;
      }
      p {
        margin: 0.75rem 0 0;
        color: #bbf7d0;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>Fastifly will sync supported changes when your connection returns.</p>
    </main>
  </body>
</html>
