services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: fastifly
      POSTGRES_USER: fastifly
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fastifly -d fastifly"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - fastifly-postgres-data:/var/lib/postgresql/data

  fastifly:
    build:
      context: .
      target: production
    image: fastifly:local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${FASTIFLY_PORT:-3000}:3000"
    environment:
      APP_ENV: production
      HOST: 0.0.0.0
      APP_PORT: 3000
      APP_URL: "${APP_URL:-http://localhost:3000}"
      DATABASE_DRIVER: postgres
      DATABASE_URL: "postgres://fastifly:${POSTGRES_PASSWORD}@postgres:5432/fastifly?sslmode=disable"
      SESSION_SECRET: "${SESSION_SECRET:?SESSION_SECRET must be at least 32 characters}"
      COOKIE_SECURE: "${COOKIE_SECURE:-false}"
      AUTO_MIGRATE: "false"
    security_opt:
      - no-new-privileges:true

  fastifly-migrate:
    build:
      context: .
      target: migrations
    image: fastifly:migrations
    profiles:
      - migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_DRIVER: postgres
      DATABASE_URL: "postgres://fastifly:${POSTGRES_PASSWORD}@postgres:5432/fastifly?sslmode=disable"
    command: ["./node_modules/.bin/fastifly", "migrate", "up"]

volumes:
  fastifly-postgres-data:
