name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: fastifly_ci
          POSTGRES_USER: fastifly
          POSTGRES_PASSWORD: fastifly
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fastifly -d fastifly_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Typecheck with tsc
        run: pnpm typecheck:tsc

      - name: Validate TypeScript project reference graph
        run: pnpm typecheck:refs

      - name: Test
        run: pnpm test

      - name: Test SQLite lane
        run: pnpm test:sqlite

      - name: Test PostgreSQL lane (PGlite + runtime adapter)
        env:
          FASTIFLY_TEST_POSTGRES_URL: postgres://fastifly:fastifly@127.0.0.1:5432/fastifly_ci
        run: pnpm test:postgres
